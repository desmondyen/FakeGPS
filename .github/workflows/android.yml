name: Android CI

# 定制每次打包在 GitHub Actions 列表里显示的动态名字
run-name: 🛠️ 正在打包：现代版 FakeGPS (由 @${{ github.actor }} 触发)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允许你在网页上点击“Run workflow”手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予脚本直接发布到 Releases 的最高权限

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' # 👈 完美匹配 Java 21 编译链，拒绝编译版本报错
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug # 👈 仅编译 Debug 安装包，速度极快，跳过不必要的代码测试

    # 🚀 动作一：将编译好的 APK 直接发布到你的仓库主页 Releases
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.0-${{ github.run_number }}
        name: 🚀 FakeGPS 完美兼容 Android 14/15/16 版
        body: |
          此版本已完成全套高版本安卓安全沙箱加固：
          - 兼容 Android 14/15/16 (API 36)
          - 显式植入定位类型前台服务
          - 支持最新的 Java 21 构建环境
          
          ⚠️ 安装后记得先去【开发者选项】勾选本应用再打开！
        files: app/build/outputs/apk/debug/app-debug.apk

    # 🚀 动作二：同时在 Actions 页面最下方留一份备份下载（Artifacts）
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeGPS-Android16-Compatible
        path: app/build/outputs/apk/debug/app-debug.apk
